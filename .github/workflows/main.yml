## What each part of the YAML means:

| Part | What it does |
|------|-------------|
| `name: Python CI` | Name of your workflow |
| `on: push` | Runs automatically when you push code |
| `runs-on: ubuntu-latest` | Uses a Linux computer to run |
| `actions/checkout@v3` | Downloads your code |
| `setup-python@v4` | Installs Python 3.10 |
| `pip install pytest` | Installs testing tool |
| `python test_app.py` | Runs your test file |

